{% extends 'calculator/base.html' %}
{% block title %}New Post{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2 class="fw-bold mb-4"><i class="bi bi-pencil-square me-2" style="color:#3FB884;"></i>Create Forum Post</h2>
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            {{ form.title }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Category</label>
            {{ form.tag }}
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Post content</label>
            {{ form.body }}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success px-4">
              <i class="bi bi-send me-1"></i>Publish Post
            </button>
            <a href="{% url 'forum_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
